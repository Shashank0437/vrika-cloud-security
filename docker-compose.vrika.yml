# Vrika POC overlay — Prowler on host :8090 (all interfaces for Docker bridge access)
# Public UI via host nginx https://…/prowler/
services:
  nginx:
    image: nginx:alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    container_name: vrika-prowler-nginx
    restart: unless-stopped
    ports:
      # Bind all interfaces so vrika-server-api (Docker) can reach via host.docker.internal:8090
      - "8090:80"
    volumes:
      - ./contrib/reverse-proxy/nginx.vrika.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ui:
        condition: service_healthy
      api:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_BASE_PATH: /prowler
        NEXT_PUBLIC_VRIKA_EMBED_MODE: "true"
        NEXT_PUBLIC_PROWLER_RELEASE_VERSION: ${NEXT_PUBLIC_PROWLER_RELEASE_VERSION:-v5.34.0}
    image: vrika-prowler-ui:local
    ports: !reset []
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/prowler/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s

  api:
    ports: !reset []
    # Z800 cold start: migrations + Gunicorn + compliance cache warm-up can exceed 3 min.
    healthcheck:
      start_period: 180s
      interval: 15s
      timeout: 10s
      retries: 16

  mcp-server:
    ports: !reset []

  postgres:
    ports: !reset []

  valkey:
    ports: !reset []

  neo4j:
    ports: !reset []
    healthcheck:
      start_period: 180s
      interval: 15s
      timeout: 15s
      retries: 20
