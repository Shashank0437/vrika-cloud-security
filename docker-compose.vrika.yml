# Vrika POC overlay — Prowler on 127.0.0.1:8090, public via host nginx /prowler/
services:
  nginx:
    image: nginx:alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    container_name: vrika-prowler-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./contrib/reverse-proxy/nginx.vrika.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ui:
        condition: service_healthy
      api:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_BASE_PATH: /prowler
        NEXT_PUBLIC_PROWLER_RELEASE_VERSION: ${NEXT_PUBLIC_PROWLER_RELEASE_VERSION:-v5.34.0}
    image: vrika-prowler-ui:local
    ports: !reset []

  api:
    ports: !reset []

  mcp-server:
    ports: !reset []

  postgres:
    ports: !reset []

  valkey:
    ports: !reset []

  neo4j:
    ports: !reset []
    healthcheck:
      start_period: 180s
      interval: 15s
      timeout: 15s
      retries: 20
